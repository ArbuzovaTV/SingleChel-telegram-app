<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Встречи</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .text {
      margin: 6px 0;
      color: #ddd;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2ea6ff;
      color: white;
      font-size: 16px;
    }

    .error {
      color: #ff8a8a;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>Ближайшие встречи</h2>
  <div id="events">Загружаю встречи...</div>

  <script>
    const SUPABASE_URL = "https://vwndungrimwhqavjmoqi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wat516OIujm-quDFBJ9VSQ_T1EWWZcT";

    async function loadEvents() {
      const container = document.getElementById("events");
      container.textContent = "Загружаю встречи...";

      try {
        const response = await fetch(
          SUPABASE_URL + "/rest/v1/events?select=*",
          {
            method: "GET",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY
            }
          }
        );

        const text = await response.text();

        if (!response.ok) {
          container.innerHTML = '<div class="error">Ошибка ' + response.status + '\n' + text + '</div>';
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          container.innerHTML = '<div class="error">Ошибка разбора JSON:\n' + text + '</div>';
          return;
        }

        if (!Array.isArray(data)) {
          container.innerHTML = '<div class="error">Ответ не является массивом:\n' + text + '</div>';
          return;
        }

        if (data.length === 0) {
          container.textContent = "Встреч пока нет.";
          return;
        }

        container.innerHTML = "";

        for (let i = 0; i < data.length; i++) {
          const event = data[i];

          const card = document.createElement("div");
          card.className = "card";

          const title = document.createElement("div");
          title.className = "title";
          title.textContent = event.title || "";

          const description = document.createElement("div");
          description.className = "text";
          description.textContent = event.description || "";

          const date = document.createElement("div");
          date.className = "text";
          date.textContent = "Дата: " + (event.event_date || "");

          const time = document.createElement("div");
          time.className = "text";
          time.textContent = "Время: " + (event.event_time || "");

          const place = document.createElement("div");
          place.className = "text";
          place.textContent = "Место: " + (event.place || "");

          const button = document.createElement("button");
          button.textContent = "Участвовать";
          button.onclick = function () {
            alert("Тестовая запись на встречу: " + (event.title || ""));
          };

          card.appendChild(title);
          card.appendChild(description);
          card.appendChild(date);
          card.appendChild(time);
          card.appendChild(place);
          card.appendChild(button);

          container.appendChild(card);
        }
      } catch (error) {
        container.innerHTML = '<div class="error">Ошибка JavaScript: ' + error.message + '</div>';
      }
    }

    loadEvents();
  </script>
</body>
</html>
