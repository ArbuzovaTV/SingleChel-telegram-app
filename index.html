<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Встречи</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      padding: 20px;
      margin: 0;
    }

    h2 {
      margin-top: 0;
    }

    .event {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      background: #2ea6ff;
      border: none;
      padding: 10px;
      border-radius: 6px;
      color: white;
      margin-top: 10px;
      width: 100%;
      cursor: pointer;
    }

    .error {
      color: #ff8080;
      white-space: pre-wrap;
    }

    .muted {
      color: #bdbdbd;
    }
  </style>
</head>
<body>
  <h2>Ближайшие встречи</h2>
  <div id="events" class="muted">Загружаю встречи...</div>

  <script>
    const SUPABASE_URL = "ВСТАВЬ_СЮДА_URL";
    const SUPABASE_KEY = "ВСТАВЬ_СЮДА_PUBLISHABLE_KEY";

    async function loadEvents() {
      const container = document.getElementById("events");

      try {
        const response = await fetch(
          ${SUPABASE_URL}/rest/v1/events?select=*&order=event_date.asc,
          {
            method: "GET",
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": Bearer ${SUPABASE_KEY},
              "Content-Type": "application/json"
            }
          }
        );

        const text = await response.text();

        if (!response.ok) {
          container.innerHTML = <div class="error">Ошибка HTTP ${response.status}\n${text}</div>;
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          container.innerHTML = <div class="error">Не удалось разобрать ответ сервера:\n${text}</div>;
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          container.innerHTML = <div class="muted">Встреч пока нет или API вернул пустой список.</div>;
          return;
        }

        container.innerHTML = "";

        data.forEach((event) => {
          const div = document.createElement("div");
          div.className = "event";
          div.innerHTML = 
            <h3>${event.title ?? ""}</h3>
            <p>${event.description ?? ""}</p>
            <p>${event.event_date ?? ""} ${event.event_time ?? ""}</p>
            <p>${event.place ?? ""}</p>
            <button onclick="alert('Тестовая запись на встречу: ${event.id}')">Участвовать</button>
          ;
          container.appendChild(div);
        });
      } catch (error) {
        container.innerHTML = <div class="error">Ошибка JavaScript:\n${error.message}</div>;
      }
    }

    loadEvents();
  </script>
</body>
</html>
