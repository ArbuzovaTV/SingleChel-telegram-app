<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Встречи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .text {
      margin: 6px 0;
      color: #ddd;
    }

    .user-box {
      background: #1a2a36;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2ea6ff;
      color: white;
      font-size: 16px;
    }

    .error {
      color: #ff8a8a;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="user" class="user-box">Проверяю Telegram...</div>

  <h2>Ближайшие встречи</h2>
  <div id="events">Загружаю встречи...</div>

  <script>
    const SUPABASE_URL = "https://vwndungrimwhqavjmoqi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wat516OIujm-quDFBJ9VSQ_T1EWWZcT";

    function showTelegramUser() {
      const userBox = document.getElementById("user");

      if (window.Telegram && window.Telegram.WebApp) {
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe && tg.initDataUnsafe.user;

        if (user) {
          userBox.innerHTML =
            "<b>Telegram подключён</b><br>" +
            "ID: " + user.id + "<br>" +
            "Имя: " + (user.first_name || "") + "<br>" +
            "Username: @" + (user.username || "");
        } else {
          userBox.innerHTML =
            "Приложение открыто не из Telegram Mini App или Telegram не передал данные пользователя.";
        }
      } else {
        userBox.innerHTML =
          "Telegram WebApp SDK не найден. Это нормально, если страница открыта просто в браузере.";
      }
    }

async function joinEvent(eventId, eventTitle) {
  try {
    if (!(window.Telegram && window.Telegram.WebApp)) {
      alert("Приложение нужно открыть внутри Telegram.");
      return;
    }

    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe && tg.initDataUnsafe.user;

    if (!user) {
      alert("Telegram не передал данные пользователя.");
      return;
    }

    const telegramId = String(user.id);
    const username = user.username || null;
    const firstName = user.first_name || null;

    let userId = null;

    const userResponse = await fetch(
      SUPABASE_URL + "/rest/v1/users?telegram_id=eq." + encodeURIComponent(telegramId) + "&select=id",
      {
        method: "GET",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      }
    );

    const existingUsers = await userResponse.json();

    if (Array.isArray(existingUsers) && existingUsers.length > 0) {
      userId = existingUsers[0].id;
    } else {
      const createUserResponse = await fetch(
        SUPABASE_URL + "/rest/v1/users",
        {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json",
            Prefer: "return=representation"
          },
          body: JSON.stringify({
            telegram_id: telegramId,
            username: username,
            first_name: firstName
          })
        }
      );

      const createdUsers = await createUserResponse.json();

      if (Array.isArray(createdUsers) && createdUsers.length > 0) {
        userId = createdUsers[0].id;
      }
    }

    if (!userId) {
      alert("Не удалось создать или найти пользователя.");
      return;
    }

    const participantResponse = await fetch(
      SUPABASE_URL + "/rest/v1/participants",
      {
        method: "POST",
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user_id: userId,
          event_id: eventId
        })
      }
    );

   if (!participantResponse.ok) {
  const errorText = await participantResponse.text();

  if (
    errorText.includes("unique_user_event") ||
    errorText.includes("duplicate key") ||
    errorText.includes("23505")
  ) {
    alert("Вы уже записаны на эту встречу.");
  } else {
    alert("Ошибка записи на встречу: " + errorText);
  }

  return;
}

    alert("Вы записаны на встречу: " + eventTitle);
    await loadEvents();
  } catch (error) {
    alert("Ошибка JavaScript: " + error.message);
  }
}
    
async function checkParticipation(eventId, telegramId) {
  const response = await fetch(
    SUPABASE_URL +
      "/rest/v1/admin_event_participants?event_id=eq." +
      eventId +
      "&telegram_id=eq." +
      telegramId +
      "&select=participant_id",
    {
      method: "GET",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const data = await response.json();
  return Array.isArray(data) && data.length > 0;
}

    async function loadEvents() {
      const container = document.getElementById("events");

const tg = window.Telegram.WebApp;
const user = tg.initDataUnsafe && tg.initDataUnsafe.user;
const telegramId = user ? String(user.id) : null;
      
      container.textContent = "Загружаю встречи...";

      try {
        const response = await fetch(
          SUPABASE_URL + "/rest/v1/events?select=*",
          {
            method: "GET",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY
            }
          }
        );

        const text = await response.text();

        if (!response.ok) {
          container.innerHTML = '<div class="error">Ошибка ' + response.status + '\n' + text + '</div>';
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          container.innerHTML = '<div class="error">Ошибка разбора JSON:\n' + text + '</div>';
          return;
        }

        if (!Array.isArray(data)) {
          container.innerHTML = '<div class="error">Ответ не является массивом:\n' + text + '</div>';
          return;
        }

        if (data.length === 0) {
          container.textContent = "Встреч пока нет.";
          return;
        }

        container.innerHTML = "";

        for (let i = 0; i < data.length; i++) {
          const event = data[i];

          const card = document.createElement("div");
          card.className = "card";

          const title = document.createElement("div");
          title.className = "title";
          title.textContent = event.title || "";

          const description = document.createElement("div");
          description.className = "text";
          description.textContent = event.description || "";

          const date = document.createElement("div");
          date.className = "text";
          date.textContent = "Дата: " + (event.event_date || "");
          const time = document.createElement("div");
          time.className = "text";
          time.textContent = "Время: " + (event.event_time || "");

          const place = document.createElement("div");
          place.className = "text";
          place.textContent = "Место: " + (event.place || "");

          const button = document.createElement("button");

if (telegramId && await checkParticipation(event.id, telegramId)) {
  button.textContent = "✓ Вы записаны";
  button.style.backgroundColor = "#28a745";

  button.onclick = function () {

    if (confirm("Вы хотите отменить запись?")) {
      cancelEvent(event.id);
    }

  };
}
} else {
  button.textContent = "Участвовать";
  button.style.backgroundColor = "#2ea6ff";
  button.onclick = function () {
    joinEvent(event.id, event.title || "");
  };
}

          card.appendChild(title);
          card.appendChild(description);
          card.appendChild(date);
          card.appendChild(time);
          card.appendChild(place);
          card.appendChild(button);

          container.appendChild(card);
        }
      } catch (error) {
        container.innerHTML = '<div class="error">Ошибка JavaScript: ' + error.message + '</div>';
      }
    }

    showTelegramUser();
    loadEvents();
  </script>
</body>
</html>
