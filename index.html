<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Встречи</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      padding: 20px;
    }

    .event {
      background: #1f1f1f;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      background: #2ea6ff;
      border: none;
      padding: 10px;
      border-radius: 6px;
      color: white;
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>Ближайшие встречи</h2>

<div id="events"></div>

<script>
const SUPABASE_URL = "ТВОЙ_URL";
const SUPABASE_KEY = "ТВОЙ_PUBLISHABLE_KEY";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadEvents() {
  const container = document.getElementById("events");
  container.innerHTML = "<p>Загружаю встречи...</p>";

  try {
    const { data, error } = await supabaseClient
      .from("events")
      .select("*")
      .order("event_date", { ascending: true });

    if (error) {
      container.innerHTML = <p>Ошибка Supabase: ${error.message}</p>;
      return;
    }

    if (!data || data.length === 0) {
      container.innerHTML = "<p>В таблице events пока нет встреч.</p>";
      return;
    }

    container.innerHTML = "";

    data.forEach((event) => {
      const div = document.createElement("div");
      div.className = "event";

      div.innerHTML = 
        <h3>${event.title ?? ""}</h3>
        <p>${event.description ?? ""}</p>
        <p>${event.event_date ?? ""} ${event.event_time ?? ""}</p>
        <p>${event.place ?? ""}</p>
        <button onclick="joinEvent('${event.id}')">Участвовать</button>
      ;

      container.appendChild(div);
    });
  } catch (e) {
    container.innerHTML = <p>Ошибка JavaScript: ${e.message}</p>;
  }
}

async function joinEvent(eventId) {
  alert("Запись пока тестовая. ID встречи: " + eventId);
}

loadEvents();
</script>

</body>
</html>
